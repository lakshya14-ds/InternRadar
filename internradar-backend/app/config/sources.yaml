# Manual internship sources scraped via CSS selector.
# All sources here are India-focused.
# Fields:
#   name             : display name stored in the DB
#   type             : tag applied to each internship
#   url              : page to scrape
#   selector         : CSS selector for job link elements
#   location         : default location tag when none is parsed from the link text
#   refresh_interval : minutes between re-checks

sources:

  # ── Dedicated Indian internship platforms ──────────────────────────────────

  - name: Internshala
    type: internshala
    url: https://internshala.com/internships/
    selector: "a.job-title-href"
    location: India
    refresh_interval: 30

  - name: Internshala Engineering
    type: internshala
    url: https://internshala.com/internships/engineering-internship/
    selector: "a.job-title-href"
    location: India
    refresh_interval: 30

  - name: Internshala Computer Science
