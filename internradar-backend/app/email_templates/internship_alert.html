<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Internship Matches — InternRadar</title>
</head>
<body style="margin:0;padding:0;background-color:#030712;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#030712;min-height:100vh;">
<tr><td align="center" style="padding:40px 16px;">
<table width="100%" style="max-width:560px;margin:0 auto;">
  <!-- Header -->
  <tr><td style="padding-bottom:32px;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td>
          <div style="display:inline-flex;align-items:center;gap:8px;">
            <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;">
              <span style="color:white;font-size:14px;font-weight:bold;">IR</span>
            </div>
            <span style="color:white;font-size:18px;font-weight:700;vertical-align:middle;margin-left:8px;">InternRadar</span>
          </div>
        </td>
      </tr>
    </table>
  </td></tr>

  <!-- Body -->
  <tr><td style="background:#0f1623;border:1px solid #1e293b;border-radius:16px;overflow:hidden;">
    <div style="background:linear-gradient(135deg,#1e1b4b,#0f172a);padding:32px 32px 24px;">
      <div style="display:inline-block;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:100px;padding:4px 12px;margin-bottom:16px;">
        <span style="color:#818cf8;font-size:12px;font-weight:600;">🎯 New Matches Found</span>
      </div>
      <h1 style="color:#f8fafc;font-size:24px;font-weight:700;margin:0 0 8px;">{{count}} New Internship Match{{count == 1 ? '' : 'es'}}</h1>
      <p style="color:#94a3b8;font-size:14px;margin:0;">Fresh opportunities matching your preferences are available now.</p>
    </div>

    <div style="padding:24px 32px;">
      {{cards}}

      <div style="text-align:center;margin-top:24px;">
        <a href="https://internradar.app/internships" style="display:inline-block;background:#6366f1;color:white;text-decoration:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;">
          View All Internships →
        </a>
      </div>
    </div>
  </td></tr>

  <!-- Footer -->
  <tr><td style="padding:24px 0;text-align:center;">
    <p style="color:#475569;font-size:12px;margin:0;">
      You're receiving this because you enabled email alerts on InternRadar.<br>
      <a href="#" style="color:#6366f1;text-decoration:none;">Manage preferences</a> · <a href="#" style="color:#6366f1;text-decoration:none;">Unsubscribe</a>
    </p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
